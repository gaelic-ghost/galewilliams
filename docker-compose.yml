# Docker Compose file for local Vapor validation.
#
# This mirrors the official Vapor CLI template shape, adapted for the
# GalewilliamsSite executable and PostgreSQL defaults. It is not a production
# deployment definition.
#
# Build images: docker compose build
# Legacy fallback: docker-compose build
# Start app: docker compose up app
# Start database: docker compose up db
# Run migrations: docker compose run migrate
# Revert migrations: docker compose run revert
# Stop all: docker compose down
# Wipe local database volume: docker compose down -v

volumes:
  db_data:

x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DATABASE_HOST: db
  DATABASE_PORT: 5432
  DATABASE_NAME: &db_name galewilliams_site
  DATABASE_USERNAME: &db_username galewilliams
  DATABASE_PASSWORD: &db_password development-password

services:
  app:
    image: galewilliams-site:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
    ports:
      - '8080:8080'
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]

  migrate:
    image: galewilliams-site:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    image: galewilliams-site:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0

  db:
    image: postgres:18-alpine
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: *db_username
      POSTGRES_PASSWORD: *db_password
      POSTGRES_DB: *db_name
    ports:
      - '5432:5432'
